<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivina el Código 7</title>
    
    <meta name="theme-color" content="#00a8ff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="white-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            /* PALETA DE COLORES DEL LOGO '7' */
            --bg-body: #e6f4fc; 
            
            --blue-light: #00a8ff; 
            --blue-dark: #008cd6; 
            --blue-shadow: #006da6;
            
            --red-light: #ff4d4f; 
            --red-dark: #e63946; 
            --red-shadow: #b91c1c;
            
            --yellow-light: #ffb300; 
            --yellow-dark: #f59e0b; 
            --yellow-shadow: #d97706;

            --green-light: #25d3a5; 
            --green-dark: #10b981;
            --green-shadow: #059669;

            --text-main: #0f172a; 
            --text-muted: #475569; 
            --border-color: #cbd5e1;
        }

        html, body { overscroll-behavior-y: none; }

        body { font-family: 'Poppins', sans-serif; background: var(--bg-body); color: var(--text-main); text-align: center; margin: 0; padding: 20px 15px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; }
        .oculto { display: none !important; }
        .contenedor { width: 100%; max-width: 500px; }

        .logo-img { max-height: 140px; margin-bottom: 20px; object-fit: contain; filter: drop-shadow(0 15px 20px rgba(0, 168, 255, 0.25)); border-radius: 35px; }
        
        button { border: none; border-radius: 50px; font-weight: 800; color: white; cursor: pointer; transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); text-transform: uppercase; letter-spacing: 1px; }
        button:active { transform: translateY(6px); }
        button:disabled { filter: grayscale(100%); opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none !important; }

        .btn-blue { background: linear-gradient(135deg, var(--blue-light), var(--blue-dark)); box-shadow: 0 6px 0px var(--blue-shadow), 0 10px 20px rgba(0, 168, 255, 0.3); }
        .btn-blue:active { box-shadow: 0 0px 0px var(--blue-shadow), 0 4px 10px rgba(0, 168, 255, 0.3); }
        
        .btn-red { background: linear-gradient(135deg, var(--red-light), var(--red-dark)); box-shadow: 0 6px 0px var(--red-shadow), 0 10px 20px rgba(255, 77, 79, 0.3); }
        .btn-red:active { box-shadow: 0 0px 0px var(--red-shadow), 0 4px 10px rgba(255, 77, 79, 0.3); }
        
        .btn-yellow { background: linear-gradient(135deg, var(--yellow-light), var(--yellow-dark)); box-shadow: 0 6px 0px var(--yellow-shadow), 0 10px 20px rgba(255, 179, 0, 0.3); color: #fff; text-shadow: 1px 1px 0px rgba(0,0,0,0.1); }
        .btn-yellow:active { box-shadow: 0 0px 0px var(--yellow-shadow), 0 4px 10px rgba(255, 179, 0, 0.3); }

        .btn-green { background: linear-gradient(135deg, var(--green-light), var(--green-dark)); box-shadow: 0 6px 0px var(--green-shadow), 0 10px 20px rgba(37, 211, 165, 0.3); color: white; }
        .btn-green:active { box-shadow: 0 0px 0px var(--green-shadow), 0 4px 10px rgba(37, 211, 165, 0.3); }

        input[type="text"], input[type="number"], select { padding: 14px 16px; border-radius: 18px; border: 2px solid #cbd5e1; box-sizing: border-box; font-family: 'Poppins', sans-serif; text-align: center; outline: none; transition: 0.2s; font-size: 18px; font-weight: 800; color: var(--text-main); background: #f8fafc; width: 100%; letter-spacing: 2px;}
        input:focus, select:focus { border-color: var(--blue-light); background: #fff; box-shadow: 0 0 0 4px rgba(0, 168, 255, 0.15); }
        
        .label-modern { display: block; text-align: left; font-size: 12px; font-weight: 900; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }

        .tarjeta { background: white; padding: 25px 20px; border-radius: 32px; box-shadow: 0 15px 35px rgba(0, 168, 255, 0.08); margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .codigo-sala { font-family: monospace; font-size: 40px; font-weight: 900; color: var(--red-light); background: #fff1f2; padding: 15px; border-radius: 20px; letter-spacing: 12px; display: inline-block; margin: 10px 0 20px 0; border: 3px dashed var(--red-light); }
        .alerta { color: var(--red-light); font-size: 13px; font-weight: 700; margin: 8px 0; min-height: 20px; }

        @keyframes fadeInSlide { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeInSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .marcador { background: linear-gradient(135deg, var(--blue-light), var(--blue-dark)); color: white; padding: 15px 20px; border-radius: 24px; box-shadow: 0 8px 0px var(--blue-shadow); margin-bottom: 20px; border: 3px solid rgba(255,255,255,0.3); }
        .marcador.rival { background: linear-gradient(135deg, var(--red-light), var(--red-dark)); box-shadow: 0 8px 0px var(--red-shadow); }

        /* TABLERO DE NÚMEROS */
        .tarjeta-juego { background: white; border: 3px solid var(--border-color); border-radius: 28px; padding: 20px 15px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.03); }
        
        .display-intentos { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; max-height: 250px; overflow-y: auto; padding-right: 5px;}
        .display-intentos::-webkit-scrollbar { width: 6px; }
        .display-intentos::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .display-intentos::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .fila-intento { display: flex; align-items: center; justify-content: space-between; background: #f8fafc; padding: 10px 15px; border-radius: 16px; border: 2px solid var(--border-color); }
        .numero-intento { font-family: monospace; font-size: 22px; font-weight: 900; letter-spacing: 5px; color: var(--blue-dark); }
        
        .pistas-caja { display: flex; gap: 8px; }
        .pista-badge { padding: 4px 10px; border-radius: 8px; font-size: 13px; font-weight: 900; color: white; }
        .pista-verde { background: var(--green-light); box-shadow: 0 3px 0 var(--green-dark); }
        .pista-amarilla { background: var(--yellow-light); box-shadow: 0 3px 0 var(--yellow-dark); }

        /* CONTROLES COMPACTOS NÚMEROS */
        .panel-mando { background: #f1f5f9; padding: 15px; border-radius: 20px; border: 3px dashed #cbd5e1; display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .input-gigante { font-size: 30px !important; height: 60px; letter-spacing: 15px !important; text-align: center; }
        
        .mis-secretos { background: #fff; border: 3px dashed var(--red-light); border-radius: 24px; padding: 20px; margin-top: 20px; text-align: center; box-shadow: 0 8px 15px rgba(255, 77, 79, 0.08);}
        .numero-secreto-display { font-family: monospace; font-size: 32px; font-weight: 900; color: var(--text-main); letter-spacing: 8px; background: #f8fafc; padding: 10px; border-radius: 16px; border: 2px solid var(--border-color); margin-top: 10px;}

        @keyframes latido { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="contenedor">

    <div id="pantalla-inicio" class="fade-in" style="margin-top: 2vh; width: 100%;">
        <img src="icono-512.png" alt="Logo 7" class="logo-img" onerror="this.style.display='none'">
        <div class="tarjeta">
            <h1 style="margin: 0 0 20px 0; font-size: 26px; font-weight: 900; color: var(--blue-dark); letter-spacing: -1px;">Adivina el Código</h1>
            <div style="text-align: left; margin-bottom: 25px;">
                <label class="label-modern">Tu Apodo</label>
                <input type="text" id="input-nombre" placeholder="Ej. Rompecódigos" autocomplete="off" maxlength="12">
            </div>
            <div class="grid-2">
                <button onclick="mostrarHost()" class="btn-blue" style="width: 100%; padding: 18px 0; font-size: 15px;">🛠️ Crear Sala</button>
                <button onclick="mostrarGuest()" class="btn-red" style="width: 100%; padding: 18px 0; font-size: 15px;">🎮 Unirse</button>
            </div>
        </div>
    </div>

    <div id="pantalla-host" class="tarjeta oculto fade-in">
        <div id="host-paso1">
            <h2 style="margin: 0 0 20px 0; font-size: 24px; font-weight: 900; color: var(--blue-dark);">Configurar Partida</h2>
            
            <div style="text-align: left; margin-bottom: 25px; background: #e0f2fe; padding: 18px; border-radius: 20px; border: 3px dashed var(--blue-light);">
                <label class="label-modern" style="color: var(--blue-dark);">🔢 Longitud del Código</label>
                <select id="host-longitud" style="border-color: var(--blue-light); color: var(--blue-dark); font-weight: 900; font-size: 18px;">
                    <option value="4">4 Dígitos (Fácil)</option>
                    <option value="5">5 Dígitos (Normal)</option>
                    <option value="6">6 Dígitos (Difícil)</option>
                    <option value="7">7 Dígitos (Experto)</option>
                    <option value="8">8 Dígitos (Locura)</option>
                    <option value="9">9 Dígitos (Imposible)</option>
                </select>
            </div>
            <button onclick="hostGenerarCodigo()" class="btn-yellow" style="width: 100%; padding: 18px; font-size: 16px;">Siguiente Paso ➔</button>
        </div>
        
        <div id="host-paso2" class="oculto fade-in">
            <label class="label-modern" style="text-align: center;">Código de Invitación</label>
            <div class="codigo-sala" id="mostrar-codigo">...</div>
            
            <div style="display: flex; gap: 8px; justify-content: center; margin-bottom: 25px; width: 100%;">
                <button onclick="copiarCodigo()" class="btn-blue" style="padding: 12px 15px; font-size: 13px; border-radius: 14px; box-shadow: 0 5px 0px var(--blue-shadow);">📋 Copiar</button>
                <button onclick="compartirCodigo()" class="btn-green" style="padding: 12px 15px; font-size: 13px; border-radius: 14px; box-shadow: 0 5px 0px var(--green-shadow); flex: 1;">💬 Compartir</button>
            </div>

            <div style="background:#f8fafc; padding:20px; border-radius:24px; border: 3px solid var(--border-color); margin-bottom: 15px;">
                <label class="label-modern">Ingresa tu Código Secreto</label>
                <input type="text" id="host-secreto" placeholder="1234..." autocomplete="off" class="input-gigante" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>
            <p id="error-host" class="alerta"></p>
            <button id="btn-esperar" onclick="hostGuardarSecreto()" class="btn-blue" style="width: 100%; padding: 18px; font-size: 16px;" disabled>Esperando Rival...</button>
        </div>
    </div>

    <div id="pantalla-guest" class="tarjeta oculto fade-in">
        <div id="guest-paso1">
            <h2 style="margin: 0 0 20px 0; font-size: 24px; font-weight: 900; color: var(--red-light);">Unirse a Sala</h2>
            <label class="label-modern">Ingresa el Código</label>
            <input type="text" id="guest-codigo" placeholder="ABCD" maxlength="4" style="font-size: 34px; width: 100%; text-transform: uppercase; margin-bottom: 20px; letter-spacing: 8px; padding: 20px;">
            <p id="error-guest-conexion" class="alerta"></p>
            <button onclick="guestConectar()" class="btn-yellow" style="width: 100%; padding: 18px; font-size: 16px;">Conectar Ahora ➔</button>
        </div>
        <div id="guest-paso2" class="oculto fade-in">
            <div style="background: var(--blue-light); color: white; padding: 15px; border-radius: 16px; margin-bottom: 25px; font-weight: 800; font-size: 16px;">
                Adivinarán un código de <span id="guest-mostrar-num" style="font-weight: 900; font-size: 22px; color: var(--yellow-light);"></span> dígitos.
            </div>
            <div style="background:#f8fafc; padding:20px; border-radius:24px; border: 3px solid var(--border-color); margin-bottom: 15px;">
                <label class="label-modern">Ingresa tu Código Secreto</label>
                <input type="text" id="guest-secreto" placeholder="1234..." autocomplete="off" class="input-gigante" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
            </div>
            <p id="error-guest" class="alerta"></p>
            <button id="btn-guest-listo" onclick="guestGuardarSecreto()" class="btn-blue" style="width: 100%; padding: 18px; font-size: 16px;">¡Listo para Jugar!</button>
        </div>
    </div>

    <div id="pantalla-juego" class="oculto fade-in" style="width: 100%;">
        <div class="marcador" id="caja-marcador">
            <h2 id="titulo-turno" style="margin:0; font-size: 22px; font-weight: 900;">Prepárate...</h2>
            <p id="subtitulo-turno" style="margin: 5px 0 0 0; font-size: 14px; font-weight: 700; opacity: 0.9;">Iniciando conexión</p>
        </div>

        <div id="zona-revancha" class="oculto fade-in" style="margin-bottom: 20px;">
            <button onclick="solicitarRevancha()" class="btn-yellow" style="width: 100%; padding: 20px; font-size: 18px; animation: latido 1.5s infinite;">🔄 ¡JUGAR REVANCHA!</button>
        </div>

        <div class="tarjeta-juego">
            <h3 style="margin: 0 0 15px 0; font-size: 14px; color: var(--text-muted); text-transform: uppercase; font-weight: 900;">Historial de Intentos</h3>
            <div class="display-intentos" id="historial-intentos">
                </div>

            <div class="panel-mando" id="panel-juego">
                <label class="label-modern">Tu Intento</label>
                <input type="text" id="input-adivinar" class="input-gigante" autocomplete="off" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                <button onclick="intentarAdivinar()" class="btn-blue" style="width: 100%; padding: 18px; font-size: 18px; margin-top: 5px;">PROBAR CÓDIGO</button>
            </div>
        </div>

        <div class="tarjeta-juego" style="background: #f8fafc;">
            <h3 style="margin: 0 0 10px 0; font-size: 14px; color: var(--red-light); text-transform: uppercase; font-weight: 900;">Progreso del Rival</h3>
            <p id="estado-rival" style="font-size: 14px; font-weight: 700; margin: 0; color: var(--text-main);">Intentos: 0</p>
        </div>
        
        <div class="mis-secretos" id="zona-mis-secretos">
            <h3 style="margin:0; font-size:14px; text-transform:uppercase; color: var(--red-dark); font-weight: 900;">Tu Código Defensor</h3>
            <div class="numero-secreto-display" id="mi-codigo-display">0000</div>
        </div>

        <button onclick="volverAlInicio()" class="btn-red" style="margin-top: 30px; font-size: 13px; padding: 12px 24px; border-radius: 14px; box-shadow: none;">Salir al Menú</button>
    </div>

</div>

<script>
    let peer = null, conn = null, miRol = 0, miNombre = "Jugador", nombreRival = "Rival";
    let lenCodigo = 4, turnoActual = 1;
    let miCodigoSecreto = "", codigoRival = "";
    let misIntentos = [], intentosRival = 0;
    let enJuegoActivo = false;

    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let ctx = null; try { ctx = new AudioCtx(); } catch(e) {}
    
    function playSound(t) { 
        if (!ctx) return;
        if (ctx.state === 'suspended') ctx.resume(); 
        const o = ctx.createOscillator(), g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); const n = ctx.currentTime; 
        if (t==='acierto'){ o.type='sine'; o.frequency.setValueAtTime(880,n); g.gain.setValueAtTime(0.1,n); o.start(); o.stop(n+0.1); } 
        else if (t==='error'){ o.type='square'; o.frequency.setValueAtTime(150,n); g.gain.setValueAtTime(0.05,n); o.start(); o.stop(n+0.2); } 
        else if (t==='win') { [523, 659, 783].forEach((f,i)=>{ const osc=ctx.createOscillator(), ga=ctx.createGain(); osc.connect(ga); ga.connect(ctx.destination); osc.frequency.setValueAtTime(f,n+(i*0.1)); ga.gain.setValueAtTime(0.1,n+(i*0.1)); osc.start(n+(i*0.1)); osc.stop(n+(i*0.1)+0.3); }); } 
        else if (t==='lose'){ o.type='sawtooth'; o.frequency.setValueAtTime(300,n); o.frequency.linearRampToValueAtTime(100,n+0.5); g.gain.setValueAtTime(0.1,n); o.start(); o.stop(n+0.5); } 
    }
    function vibrate(t) { if (!("vibrate" in navigator)) return; if (t === 'error') navigator.vibrate(100); if (t === 'lose') navigator.vibrate([200, 100, 400]); }

    function copiarCodigo() {
        let code = document.getElementById('mostrar-codigo').innerText;
        navigator.clipboard.writeText(code).then(() => { alert("¡Código copiado: " + code + "!"); });
    }

    function compartirCodigo() {
        let code = document.getElementById('mostrar-codigo').innerText;
        let texto = `¡Adivina mi código! Únete a la partida con el código: ${code}`;
        if (navigator.share) {
            navigator.share({ title: 'Adivina el Código', text: texto }).catch(err => console.log('Error:', err));
        } else {
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(texto)}`, '_blank');
        }
    }

    function guardarNombre() { let n = document.getElementById('input-nombre').value.trim(); if(n) miNombre = n; }
    
    function mostrarHost() { 
        guardarNombre(); miRol=1; 
        document.getElementById('pantalla-inicio').classList.add('oculto'); 
        document.getElementById('pantalla-host').classList.remove('oculto'); 
        try { history.pushState({p:'host'}, "", "#host"); } catch(e){}
    }
    
    function mostrarGuest() { 
        guardarNombre(); miRol=2; 
        document.getElementById('pantalla-inicio').classList.add('oculto'); 
        document.getElementById('pantalla-guest').classList.remove('oculto'); 
        peer = new Peer(); 
        try { history.pushState({p:'guest'}, "", "#guest"); } catch(e){}
    }

    function volverAlInicio() {
        if(conn) { conn.close(); conn = null; }
        if(peer) { peer.destroy(); peer = null; }
        location.reload();
    }

    function hostGenerarCodigo() { 
        lenCodigo = parseInt(document.getElementById('host-longitud').value);
        document.getElementById('host-paso1').classList.add('oculto');
        document.getElementById('host-paso2').classList.remove('oculto');
        
        let inSec = document.getElementById('host-secreto');
        inSec.maxLength = lenCodigo;
        inSec.placeholder = "0".repeat(lenCodigo);

        try { history.pushState({p:'espera'}, "", "#espera"); } catch(e){}
        
        let btnEspera = document.getElementById('btn-esperar');
        btnEspera.innerText = "Esperando Conexión...";

        if(!peer) {
            let r = Math.random().toString(36).substring(2,6).toUpperCase();
            peer = new Peer('c7-'+r);
            peer.on('open', id => document.getElementById('mostrar-codigo').innerText = r);
            peer.on('connection', c => { 
                conn = c; 
                conn.on('open', () => {
                    configMensajes();
                    btnEspera.innerText="¡Rival Conectado! Iniciar Partida"; 
                    btnEspera.disabled=false; 
                });
            });
        }
    }

    function hostGuardarSecreto() { 
        let sec = document.getElementById('host-secreto').value;
        if(sec.length !== lenCodigo) {
            document.getElementById('error-host').innerText = `Debe tener exactamente ${lenCodigo} números.`;
            return;
        }
        miCodigoSecreto = sec;
        conn.send({tipo:'INIT_GAME', len:lenCodigo, nombre:miNombre}); 
        document.getElementById('btn-esperar').innerText="Esperando código rival..."; 
        document.getElementById('btn-esperar').disabled=true; 
        document.getElementById('error-host').innerText = "";
    }

    function guestConectar() { 
        let c = document.getElementById('guest-codigo').value.toUpperCase(); if(!c) return; 
        document.getElementById('error-guest-conexion').innerText="Conectando..."; 
        conn = peer.connect('c7-'+c); 
        conn.on('open', ()=>{ 
            document.getElementById('error-guest-conexion').innerText=""; 
            configMensajes();
            conn.send({tipo: 'REQ_HANDSHAKE', nombre: miNombre});
        }); 
        peer.on('error', ()=> document.getElementById('error-guest-conexion').innerText="Sala no encontrada."); 
    }

    function guestGuardarSecreto() { 
        let sec = document.getElementById('guest-secreto').value;
        if(sec.length !== lenCodigo) {
            document.getElementById('error-guest').innerText = `Debe tener exactamente ${lenCodigo} números.`;
            return;
        }
        miCodigoSecreto = sec;
        conn.send({tipo:'SECRET_GUEST', secreto:miCodigoSecreto, nombre:miNombre}); 
        document.getElementById('caja-inputs-guest-clasico').innerHTML="<div style='padding:25px; background:#e6f4fc; border-radius:20px; font-weight:900; color:var(--blue-dark); text-align:center; border: 3px dashed var(--blue-light);'>Esperando al Host...</div>"; 
    }

    function configMensajes() {
        conn.on('data', d => {
            if (d.tipo === 'REQ_HANDSHAKE' && miRol === 1) {
                nombreRival = d.nombre;
                // El host no manda la config hasta que presione el boton de iniciar
            }
            else if(d.tipo==='INIT_GAME' && miRol===2) {
                lenCodigo = d.len; nombreRival = d.nombre;
                document.getElementById('guest-paso1').classList.add('oculto'); document.getElementById('guest-paso2').classList.remove('oculto');
                document.getElementById('guest-mostrar-num').innerText = lenCodigo;
                
                let inSec = document.getElementById('guest-secreto');
                inSec.maxLength = lenCodigo; inSec.placeholder = "0".repeat(lenCodigo);
                try { history.pushState({p:'espera'}, "", "#espera"); } catch(e){}
            }
            else if(d.tipo==='SECRET_GUEST' && miRol===1){ 
                codigoRival = d.secreto; 
                turnoActual = Math.random() < 0.5 ? 1 : 2; 
                conn.send({tipo:'START_GAME', turno:turnoActual, secretoHost:miCodigoSecreto}); 
                iniciarTablero(); 
            }
            else if(d.tipo==='START_GAME' && miRol===2){ 
                codigoRival = d.secretoHost; 
                turnoActual = d.turno; 
                iniciarTablero(); 
            }
            else if(d.tipo==='GUESS'){ 
                procesarIntentoRival(d.intento, d.win); 
            }
            else if(d.tipo==='REMATCH_REQ'){ prepararRevancha(); }
        });
    }

    function iniciarTablero() {
        try { history.pushState({p:'juego'}, "", "#juego"); } catch(e){}
        enJuegoActivo=true; 
        misIntentos = []; intentosRival = 0;
        
        document.querySelectorAll('.tarjeta, #pantalla-inicio').forEach(e=>e.classList.add('oculto')); 
        document.getElementById('pantalla-juego').classList.remove('oculto');
        
        let inAdivinar = document.getElementById('input-adivinar');
        inAdivinar.maxLength = lenCodigo;
        inAdivinar.placeholder = "0".repeat(lenCodigo);
        
        document.getElementById('mi-codigo-display').innerText = miCodigoSecreto;
        document.getElementById('historial-intentos').innerHTML = "";
        document.getElementById('estado-rival').innerText = "Intentos: 0";
        document.getElementById('panel-juego').classList.remove('oculto');
        
        updateUI();
    }

    function updateUI() {
        if(turnoActual===0) return;
        let mio = (turnoActual === miRol);
        
        let inAdivinar = document.getElementById('input-adivinar');
        let btnAdivinar = document.querySelector('#panel-juego button');
        
        inAdivinar.disabled = !mio;
        btnAdivinar.disabled = !mio;

        const m = document.getElementById('caja-marcador');
        if(mio){ 
            document.getElementById('titulo-turno').innerText="¡TU TURNO!"; 
            m.className="marcador"; 
        } else { 
            document.getElementById('titulo-turno').innerText=`Turno de ${nombreRival}`; 
            m.className="marcador rival"; 
        }
    }

    function evaluarIntento(intento, secreto) {
        let exactos = 0;
        let desordenados = 0;
        let intArr = intento.split('');
        let secArr = secreto.split('');
        
        // Primero buscar exactos (verdes)
        for(let i=0; i<lenCodigo; i++){
            if(intArr[i] === secArr[i]){
                exactos++;
                intArr[i] = null; secArr[i] = null; // Marcar como usado
            }
        }
        
        // Luego buscar desordenados (amarillos)
        for(let i=0; i<lenCodigo; i++){
            if(intArr[i] !== null){
                let pos = secArr.indexOf(intArr[i]);
                if(pos !== -1){
                    desordenados++;
                    secArr[pos] = null; // Marcar como usado
                }
            }
        }
        
        return { exactos, desordenados };
    }

    function intentarAdivinar() { 
        let input = document.getElementById('input-adivinar');
        let intento = input.value.trim();
        
        if(intento.length !== lenCodigo) {
            playSound('error'); vibrate('error'); return;
        }
        
        input.value = "";
        let res = evaluarIntento(intento, codigoRival);
        let win = (res.exactos === lenCodigo);
        
        misIntentos.push({ numero: intento, exactos: res.exactos, desordenados: res.desordenados });
        
        dibujarHistorial();
        
        if(win) {
            playSound('win'); confetti({particleCount:150, spread:70});
            conn.send({tipo:'GUESS', intento:intento, win: true});
            terminarJuego(miNombre, `¡Descifraste el código en ${misIntentos.length} intentos!`);
        } else {
            playSound('acierto');
            turnoActual = (turnoActual === 1 ? 2 : 1);
            conn.send({tipo:'GUESS', intento:intento, win: false});
            updateUI();
        }
    }

    function procesarIntentoRival(intento, win) {
        intentosRival++;
        document.getElementById('estado-rival').innerText = `Intentos: ${intentosRival} (Último: ${intento})`;
        
        if(win) {
            playSound('lose'); vibrate('lose');
            terminarJuego(nombreRival, `${nombreRival} descifró tu código en ${intentosRival} intentos.`);
        } else {
            turnoActual = miRol;
            updateUI();
        }
    }

    function dibujarHistorial() {
        let h = "";
        misIntentos.forEach((item, index) => {
            h += `
            <div class="fila-intento fade-in">
                <span class="numero-intento">${item.numero}</span>
                <div class="pistas-caja">
                    ${item.exactos > 0 ? `<span class="pista-badge pista-verde">${item.exactos} ✅</span>` : ''}
                    ${item.desordenados > 0 ? `<span class="pista-badge pista-amarilla">${item.desordenados} 🔄</span>` : ''}
                    ${(item.exactos === 0 && item.desordenados === 0) ? `<span style="font-size:12px; font-weight:800; color:var(--text-muted);">NADA ❌</span>` : ''}
                </div>
            </div>`;
        });
        let caja = document.getElementById('historial-intentos');
        caja.innerHTML = h;
        caja.scrollTop = caja.scrollHeight;
    }

    function terminarJuego(ganador, msj) {
        enJuegoActivo = false; turnoActual = 0; 
        document.getElementById('zona-revancha').classList.remove('oculto');
        document.getElementById('panel-juego').classList.add('oculto');
        
        const tit = document.getElementById('titulo-turno'); 
        const marc = document.getElementById('caja-marcador');
        
        if(ganador === miNombre){ 
            tit.innerText="¡CÓDIGO DESCIFRADO! 🎉"; 
            marc.className = "marcador";
        } else { 
            tit.innerText=`¡TUS DEFENSAS CAYERON! 💀`; 
            marc.className = "marcador rival";
        }
        document.getElementById('subtitulo-turno').innerText = msj; 
    }

    function solicitarRevancha() { conn.send({tipo:'REMATCH_REQ'}); prepararRevancha(); }
    function prepararRevancha() { 
        enJuegoActivo=false; 
        document.querySelectorAll('.tarjeta, #pantalla-juego').forEach(e=>e.classList.add('oculto')); 
        
        if(miRol===1){ 
            document.getElementById('pantalla-host').classList.remove('oculto'); 
            document.getElementById('host-paso1').classList.remove('oculto'); 
            document.getElementById('host-paso2').classList.add('oculto'); 
            document.getElementById('host-secreto').value = "";
        } else { 
            document.getElementById('pantalla-guest').classList.remove('oculto'); 
            document.getElementById('guest-paso1').classList.remove('oculto'); 
            document.getElementById('guest-paso2').classList.add('oculto'); 
            document.getElementById('guest-codigo').value=""; 
            document.getElementById('guest-secreto').value = "";
        } 
    }
    
    try { history.replaceState({p:'inicio'}, "", ""); } catch(e){}
    window.addEventListener('popstate', (e) => {
        if (enJuegoActivo && turnoActual !== 0) {
            if (confirm("⚠️ ¿Abandonar partida?")) { volverAlInicio(); } 
            else { try { history.pushState({p:'juego'}, "", "#juego"); } catch(err){} }
        } 
        else {
            volverAlInicio();
        }
    });
</script>

</body>
</html>
